<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d9bf0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TanuTweet">
  <title>TanuTweet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-title-row">
        <svg class="header-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#1d9bf0"/>
          <!-- document lines -->
          <path d="M8 10h16M8 16h10M8 22h13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <!-- dashed cutting line: upper-right segment -->
          <line x1="26" y1="6" x2="20" y2="12" stroke="#b88884" stroke-width="1.2" stroke-dasharray="2 1.5" stroke-linecap="round"/>
          <!-- dashed cutting line: lower-left segment -->
          <line x1="12" y1="20" x2="6" y2="26" stroke="#b88884" stroke-width="1.2" stroke-dasharray="2 1.5" stroke-linecap="round"/>
          <!-- scissors: provided icon scaled and rotated (handles upper-right, blades lower-left) -->
          <g transform="translate(16,16) rotate(45) scale(0.038) translate(-256,-256)" fill="#b88884">
            <path d="M211.875,291.59l-8.506-13.629c-0.014,0.024-0.025,0.043-0.041,0.063l-0.094-0.149c-9.273,14.539-15.207,23.981-15.207,23.981c-44.285,70.437-97.008,194.101-74.949,207.886l1.504,1.004c3.342,2.09,7.353,1.504,9.107-1.336l112.549-179.144l-4.26-6.77L211.875,291.59z"/>

            <path d="M213.094,262.082l0.668,1.004l-0.5-1.172C213.261,262,213.177,262,213.094,262.082z"/>
            <path d="M286.205,241.946c-11.698-18.547-24.565-39.101-36.596-58.234c-12.285-19.469-23.564-37.434-31.586-49.969c-6.6-10.363-10.194-22.308-10.36-34.676c-0.252-17.633-5.348-35.93-15.875-52.641c-18.635-29.578-49.215-46.371-78.627-46.371c-2.256,0-4.428,0.082-6.686,0.25c-11.029,1-21.807,4.426-31.584,10.527C37.461,34.313,29.188,88.54,56.344,131.657c17.379,27.738,45.287,44.199,72.945,46.203c34.174,2.508,64.754,22.562,83.053,51.554l11.281,17.965l36.596,58.32l128.176,203.71c1.002,1.668,2.924,2.59,4.93,2.59c0.168,0,0.418,0,0.584-0.086c1.254-0.082,2.424-0.5,3.51-1.168l1.588-1.004c22.058-13.785-30.748-137.449-75.033-207.886C323.972,301.856,307.177,275.118,286.205,241.946z M150.594,131.321c-4.846,3.008-10.278,4.762-15.791,5.262c-1.086,0.086-2.256,0.168-3.342,0.168c-15.709,0-32.254-9.36-42.531-25.648c-14.621-23.313-10.777-52.141,8.523-64.34c4.846-3.008,10.278-4.68,15.875-5.18c1.086-0.086,2.174-0.168,3.344-0.168c15.625,0,32.168,9.274,42.445,25.566C173.74,90.294,169.98,119.122,150.594,131.321z M256.711,265.594c-0.586,0.086-1.17,0.086-1.754,0.086c-10.112,0-18.801-7.773-19.721-18.133c-0.92-10.863,7.104-20.472,18.049-21.476c0.584,0,1.17-0.082,1.754-0.082c10.195,0,18.8,7.77,19.718,18.133C275.761,254.981,267.656,264.676,256.711,265.594z"/>
          </g>
        </svg>
        <h1 class="app-title">TanuTweet</h1>
      </div>
      <p class="app-subtitle"><span>長文のテキストをＸのポストの字数に合わせて分割</span><span class="app-version">v0.0.0</span></p>
    </div>
  </header>

  <main class="app-main">
    <section class="input-section">
      <div class="input-meta">
        <label class="input-label" for="input-text">テキストを貼り付け</label>
        <button id="clear-btn" class="btn btn-clear" disabled>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          クリア
        </button>
      </div>
      <textarea
        id="input-text"
        class="input-textarea"
        placeholder="ここに長文を貼り付けると、Post の区切り位置をサジェストします。&#10;全角文字は 2、半角文字は 1 として 280 文字以内に分割されます。"
        spellcheck="false"
        autocomplete="off"
      ></textarea>

      <div class="toolbar">
        <label class="toggle-label">
          <input type="checkbox" id="numbering-toggle" class="toggle-input" checked>
          <span class="toggle-track"></span>
          <span class="toggle-text">(1/n) 番号を付ける</span>
        </label>

        <div class="toolbar-right">
          <span class="total-chars" id="total-chars">0 文字</span>
          <span class="toolbar-arrow" id="toolbar-arrow" hidden>→</span>
          <span class="tweet-count" id="tweet-count"></span>
          <button id="copy-all-btn" class="btn btn-primary" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            全てコピー
          </button>
        </div>
      </div>
    </section>

    <section class="output-section" id="output-section">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="empty-icon">
          <rect x="8" y="12" width="32" height="4" rx="2" fill="currentColor" opacity="0.2"/>
          <rect x="8" y="22" width="24" height="4" rx="2" fill="currentColor" opacity="0.2"/>
          <rect x="8" y="32" width="28" height="4" rx="2" fill="currentColor" opacity="0.2"/>
        </svg>
        <p>テキストを入力すると<br>ここに分割結果が表示されます</p>
      </div>
    </section>
  </main>

  <div id="save-dialog" class="dialog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="dialog-msg">
    <div class="dialog-box">
      <p class="dialog-message" id="dialog-msg">変更内容を保存しますか？</p>
      <div class="dialog-actions">
        <button id="dialog-discard-btn" class="dialog-btn dialog-btn-discard">破棄</button>
        <button id="dialog-save-btn"    class="dialog-btn dialog-btn-save">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
